name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # GITHUB_TOKEN is issued to the workflow automatically, so publishing to
      # ghcr.io needs no registry secrets of its own.
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=unstable,enable=${{ contains(github.ref_name, 'unstable') }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}
          # Only a released tag may claim `latest`; a manual build off a branch must not.
          flavor: latest=${{ github.event_name == 'push' && !contains(github.ref_name, 'unstable') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RETROASSEMBLY_BUILD_TIME_VITE_VERSION=${{ github.ref_name }}
